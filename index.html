<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Mie Finanze</title>
<meta name="description" content="Gestione delle finanze giornaliere con comando vocale, offline e senza account.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#047857">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanze">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v2M3 7v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2H5a2 2 0 0 1-2-2z"/><circle cx="16" cy="14" r="1.5"/></svg>
      <h1>Le Mie Finanze</h1>
    </div>
    <div class="header-right">
      <button type="button" id="theme-toggle-btn" class="theme-toggle" aria-label="Cambia tema"></button>
      <div>
        <div class="balance-label">Saldo totale</div>
        <div id="balance-amount" class="balance-amount mono">&euro;0,00</div>
      </div>
    </div>
  </header>

  <main id="main-content" class="app-main"></main>

  <nav class="app-nav">
    <button class="nav-btn" data-tab="aggiungi" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      <span>Aggiungi</span>
    </button>
    <button class="nav-btn" data-tab="transazioni" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3h16v18l-3-2-3 2-3-2-3 2-3-2-1 2z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
      <span>Movimenti</span>
    </button>
    <button class="nav-btn" data-tab="riepilogo" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Riepilogo</span>
    </button>
    <button class="nav-btn" data-tab="categorie" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.6 13.4L13 21l-9-9 7.6-7.6a2 2 0 0 1 1.4-.6H19a2 2 0 0 1 2 2v5.6a2 2 0 0 1-.6 1.4z"/><circle cx="15.5" cy="8.5" r="1.5"/></svg>
      <span>Categorie</span>
    </button>
    <button class="nav-btn" data-tab="backup" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 18a4.5 4.5 0 0 1-1.5-8.7 5.5 5.5 0 0 1 10.7-2.3A4.5 4.5 0 0 1 17 18H7z"/><path d="M12 12v6M9.5 14.5 12 12l2.5 2.5"/></svg>
      <span>Backup</span>
    </button>
  </nav>
</div>
<script src="app.js"></script>
<div id="onboarding-overlay" class="onboarding-overlay"></div>
</body>
</html>
